<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ldce_logo.png') }}">

    <title>Complete Profile - Kairva.LD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css')}}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card card animate-slide-up" style="max-width: 650px;">
            <div class="text-center mb-4">
                <a href="{{ url_for('index') }}" class="brand justify-center" style="margin-bottom: 1rem;">
                    <img src="{{ url_for('static', filename='images/ldce_logo.png') }}" alt="LDCE Logo"
                        style="height: 40px; width: 40px; object-fit: contain; margin-right: 0.75rem; border-radius: 50%;">
                    <span class="text-primary">Kairva.LD</span>
                </a>
                <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-main);">Complete Your Profile</h2>
                {% if error %}
                <div class="alert alert-danger mt-3"
                    style="color: #ff4d4d; background: rgba(255, 77, 77, 0.1); padding: 0.75rem; border-radius: 8px; border: 1px solid rgba(255, 77, 77, 0.2);">
                    {{ error }}
                </div>
                {% endif %}
            </div>

            <form action="{{ url_for('complete_profile') }}" method="POST" enctype="multipart/form-data">
                <input type="hidden" name="csrf_token" value="{{ csrf_token() }}" />

                <div class="flex justify-center mb-6">
                    <div class="profile-pic-upload" style="position: relative; width: 120px; height: 120px;">
                        <div id="profile-preview-container"
                            style="width: 120px; height: 120px; border-radius: 50%; background: rgba(255, 255, 255, 0.03); overflow: hidden; border: 3px solid var(--primary-color); display: flex; align-items: center; justify-content: center; flex-shrink: 0;">
                            {% if user.profile_pic %}
                            <img id="profile-preview" src="{{ resolve_url(user.profile_pic) }}"
                                alt="Profile" style="width: 100%; height: 100%; object-fit: cover;">
                            {% else %}
                            <span id="profile-initials" style="font-size: 3rem; font-weight: 700; color: #FFFFFF;">{{ (user.name or 'U')[0]|upper }}</span>
                            <img id="profile-preview-hidden" src="" alt="Profile"
                                style="width: 100%; height: 100%; object-fit: cover; display: none;">
                            {% endif %}
                        </div>
                        <label for="profile_pic"
                            style="position: absolute; bottom: 0; right: 0; background: var(--primary-color); width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; border: 2px solid var(--card-bg);">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="white" stroke-width="2" stroke-linecap="round"
                                stroke-linejoin="round">
                                <path
                                    d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z" />
                                <circle cx="12" cy="13" r="4" />
                            </svg>
                        </label>
                        <input type="file" id="profile_pic" name="profile_pic" accept="image/*" style="display: none;"
                            onchange="previewImage(this)">
                    </div>
                </div>

                <script>
                    function previewImage(input) {
                        if (input.files && input.files[0]) {
                            var reader = new FileReader();
                            const initials = document.getElementById('profile-initials');
                            const preview = document.getElementById('profile-preview');

                            reader.onload = function (e) {
                                preview.src = e.target.result;
                                preview.style.display = 'block';
                                if (initials) initials.style.display = 'none';
                            }
                            reader.readAsDataURL(input.files[0]);
                        }
                    }
                </script>

                <div class="flex gap-4 flex-wrap">
                    <div class="input-group w-full">
                        <label class="input-label">Full Name <span style="color: #ff4d4d;">*</span></label>
                        <input type="text" name="name" class="input-field" value="{{ user.get('name', '') }}" required>
                    </div>
                    <div class="input-group w-full">
                        <label class="input-label">Email Address</label>
                        <input type="email" class="input-field" value="{{ user.get('email', '') }}" readonly
                            style="opacity: 0.7; cursor: not-allowed;">
                    </div>
                </div>

                <div class="flex gap-4 flex-wrap">
                    <div class="input-group w-full">
                        <label class="input-label">Enrollment Number</label>
                        <input type="text" name="enrollment_number" class="input-field" placeholder="e.g., 2021BCS001"
                            value="{{ user.get('enrollment_number', '') }}" required>
                    </div>
                    <div class="input-group w-full">
                        <label class="input-label">Branch</label>
                        <select name="branch" class="input-field" required>
                            <option value="">Select Branch</option>
                            <option value="CE" {% if user.get('branch')=='CE' %}selected{% endif %}>Computer Engineering
                            </option>
                            <option value="IC" {% if user.get('branch')=='IC' %}selected{% endif %}>Instrumentation and
                                Control</option>
                            <option value="RA" {% if user.get('branch')=='RA' %}selected{% endif %}>Robotics and
                                Automation
                            </option>
                        </select>
                    </div>
                </div>

                <div class="flex gap-4 flex-wrap">
                    <div class="input-group w-full">
                        <label class="input-label">Admission Year</label>
                        <input type="number" name="admission_year" class="input-field" placeholder="e.g., 2023"
                            min="2000" max="2030" value="{{ user.get('admission_year', '') }}" required>
                    </div>
                    <div class="input-group w-full">
                        <label class="input-label">Passout Year</label>
                        <input type="number" name="passout_year" class="input-field" placeholder="e.g., 2027" min="2000"
                            max="2035" value="{{ user.get('passout_year', '') }}" required>
                    </div>
                </div>

                <div class="flex gap-4 flex-wrap">
                    <div class="input-group w-full">
                        <label class="input-label">CPI/CGPA</label>
                        <input type="number" name="cpi" class="input-field" placeholder="e.g., 8.5" step="0.01" min="0"
                            max="10" value="{{ user.get('cpi', '') }}" required>
                    </div>
                    <div class="input-group w-full">
                        <label class="input-label">Study Type</label>
                        <select name="study_type" class="input-field" required>
                            <option value="">Select Type</option>
                            <option value="Regular" {% if user.get('study_type')=='Regular' %}selected{% endif %}>
                                Regular</option>
                            <option value="D2D" {% if user.get('study_type')=='D2D' %}selected{% endif %}>Diploma to
                                Degree (D2D)</option>
                        </select>
                    </div>
                </div>



                <div class="input-group">
                    <label class="input-label">Skills</label>
                    <textarea name="skills" class="input-field" rows="2" style="resize: none;"
                        placeholder="e.g., Python, React, Data Analysis"
                        required>{{ user.get('skills', '') }}</textarea>
                </div>

                <div class="flex gap-4 flex-wrap">
                    <div class="input-group w-full">
                        <label class="input-label">LinkedIn Profile URL <span
                                style="font-size: 0.75rem; opacity: 0.6;">(Optional)</span></label>
                        <input type="url" name="linkedin_url" class="input-field"
                            placeholder="https://linkedin.com/in/..." value="{{ user.get('linkedin_url') or '' }}">
                    </div>
                    <div class="input-group w-full">
                        <label class="input-label">GitHub Profile URL <span
                                style="font-size: 0.75rem; opacity: 0.6;">(Optional)</span></label>
                        <input type="url" name="github_url" class="input-field" placeholder="https://github.com/..."
                            value="{{ user.get('github_url') or '' }}">
                    </div>
                </div>

                <div class="flex gap-4 flex-wrap">
                    <div class="input-group w-full">
                        <label class="input-label">Personal Portfolio URL <span
                                style="font-size: 0.75rem; opacity: 0.6;">(Optional)</span></label>
                        <input type="url" name="portfolio_url" class="input-field"
                            placeholder="https://yourportfolio.com" value="{{ user.get('portfolio_url') or '' }}">
                    </div>
                    <div class="input-group w-full">
                        <label class="input-label">Resume (PDF) <span
                                style="font-size: 0.75rem; opacity: 0.6;">(Optional)</span></label>
                        <input type="file" name="resume" class="input-field" accept=".pdf" style="padding: 0.45rem;">
                        {% if user.get('resume_path') %}
                        <small
                            style="color: var(--primary-color); font-size: 0.75rem; display: block; margin-top: 0.25rem;">
                             Current Resume: <a href="{{ resolve_url(user.resume_path) }}" target="_blank"
                                 style="text-decoration: underline;">View</a>
                        </small>
                        {% endif %}
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-full mt-4">Save Profile</button>
            </form>
        </div>
    </div>
</body>

</html>
