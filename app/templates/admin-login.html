<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='images/ldce_logo.png') }}">

    <title>Admin Login - Kairva.LD</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>

<body>
    <div class="auth-container">
        <div class="auth-card card animate-slide-up" style="max-width: 420px;">
            <div class="text-center mb-4">
                <a href="{{ url_for('index') }}" class="brand justify-center" style="margin-bottom: 1rem;">
                    <img src="{{ url_for('static', filename='images/ldce_logo.png') }}" alt="LDCE Logo"
                        style="height: 40px; width: 40px; object-fit: contain; margin-right: 0.75rem; border-radius: 50%;">
                    <span class="text-primary">Kairva.LD</span> <span
                        style="font-size: 0.8rem; background: var(--danger-color); color: #FFFFFF; padding: 2px 8px; border-radius: 4px; margin-left: 8px; font-weight: 600;">Admin</span>
                </a>
                <h2 style="font-size: 1.5rem; font-weight: 700; color: var(--text-main);">Admin Portal</h2>
                <p class="text-muted mt-2">Sign in to manage the platform.</p>
            </div>

            <div id="auth-error" class="error-text mb-4" style="display: none;"></div>

            <div class="desktop-only">
                <form>
                    <div class="input-group">
                        <label class="input-label">Admin Email</label>
                        <input type="email" id="email" class="input-field" placeholder="admin@kairva.ld" required>
                    </div>
                    <div class="input-group">
                        <label class="input-label">Password</label>
                        <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                    </div>
                    <input type="hidden" id="roleSelect" value="admin">

                    <button type="button"
                        onclick="loginWithEmail(document.getElementById('email').value, document.getElementById('password').value)"
                        class="btn btn-primary w-full">Admin Sign in</button>
                </form>

                <script type="module" src="{{ url_for('static', filename='js/auth.js') }}"></script>

                <div class="text-center mt-6">
                    <a href="{{ url_for('login') }}" class="text-muted" style="font-size: 0.875rem;">Go back to Student
                        Login</a>
                </div>
            </div>

            <div class="mobile-only text-center py-6">
                <div
                    style="background: rgba(239, 68, 68, 0.1); width: 64px; height: 64px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 1.5rem;">
                    <i data-lucide="monitor-x" style="color: var(--danger-color);" size="32"></i>
                </div>
                <h3 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 0.75rem;">Mobile Access Restricted</h3>
                <p class="text-muted" style="font-size: 0.95rem; line-height: 1.5;">Please use a desktop browser to sign
                    in to the Admin Portal.</p>
                <a href="{{ url_for('index') }}" class="btn btn-outline mt-6 w-full">Back to Home</a>
            </div>
        </div>
    </div>
</body>

</html>
